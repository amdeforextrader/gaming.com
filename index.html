<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Endless Runner - Neon Cube Dodge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #0a0e27;
            font-family: 'Courier New', monospace;
            color: #00ff88;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay */
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
        }

        /* Header - Score */
        #scoreBoard {
            padding: 30px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0, 255, 136, 0.1), transparent);
            backdrop-filter: blur(10px);
        }

        #score {
            font-size: 36px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
            letter-spacing: 3px;
        }

        #difficulty {
            font-size: 14px;
            color: #00ffcc;
            margin-top: 10px;
            text-shadow: 0 0 5px #00ffcc;
        }

        /* Start Screen */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 136, 0.1) 0%, rgba(10, 14, 39, 0.95) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: all;
        }

        #startScreen.hidden {
            display: none;
            pointer-events: none;
        }

        .title {
            font-size: 72px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            }
            50% {
                text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88, 0 0 80px #00ffcc;
            }
        }

        .subtitle {
            font-size: 24px;
            color: #00ffcc;
            margin-bottom: 50px;
            text-shadow: 0 0 10px #00ffcc;
        }

        .controls-info {
            font-size: 18px;
            color: #00ff88;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.8;
        }

        .controls-info span {
            color: #ff00ff;
            font-weight: bold;
        }

        #startButton {
            padding: 20px 60px;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff88 0%, #00ffcc 100%);
            border: 3px solid #00ff88;
            color: #0a0e27;
            cursor: pointer;
            border-radius: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px #00ff88;
            text-shadow: none;
            font-family: 'Courier New', monospace;
        }

        #startButton:hover {
            box-shadow: 0 0 40px #00ff88, 0 0 60px #00ffcc;
            transform: scale(1.05);
        }

        #startButton:active {
            transform: scale(0.95);
        }

        /* Game Over Screen */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 0, 100, 0.2) 0%, rgba(10, 14, 39, 0.95) 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: all;
        }

        #gameOverScreen.show {
            display: flex;
        }

        .gameOverTitle {
            font-size: 64px;
            font-weight: bold;
            color: #ff0064;
            text-shadow: 0 0 20px #ff0064;
            margin-bottom: 30px;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 0 20px #ff0064;
            }
            50% {
                text-shadow: 0 0 40px #ff0064, 0 0 60px #ff0064;
            }
        }

        .finalScore {
            font-size: 48px;
            color: #00ff88;
            margin-bottom: 50px;
            text-shadow: 0 0 15px #00ff88;
        }

        #restartButton {
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff0064 0%, #ff0099 100%);
            border: 3px solid #ff0064;
            color: #ffffff;
            cursor: pointer;
            border-radius: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px #ff0064;
            text-shadow: none;
            font-family: 'Courier New', monospace;
        }

        #restartButton:hover {
            box-shadow: 0 0 40px #ff0064, 0 0 60px #ff0099;
            transform: scale(1.05);
        }

        #restartButton:active {
            transform: scale(0.95);
        }

        /* Bottom UI */
        #bottomUI {
            padding: 30px;
            text-align: center;
            background: linear-gradient(to top, rgba(0, 255, 136, 0.1), transparent);
        }

        .instructions {
            font-size: 14px;
            color: #00ffcc;
            text-shadow: 0 0 5px #00ffcc;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="uiOverlay">
            <div id="scoreBoard">
                <div id="score">SCORE: 0</div>
                <div id="difficulty">LEVEL: 1</div>
            </div>
            <div id="bottomUI">
                <div class="instructions">Use ← → Arrow Keys or A/D to Move | Space to Restart</div>
            </div>
        </div>

        <div id="startScreen">
            <div class="title">⚡ NEON RUNNER ⚡</div>
            <div class="subtitle">Dodge the obstacles and survive!</div>
            <div class="controls-info">
                Use <span>← → Arrow Keys</span> or <span>A/D</span> to move<br>
                Avoid the red obstacles<br>
                Collect the green cubes for points
            </div>
            <button id="startButton">START GAME</button>
        </div>

        <div id="gameOverScreen">
            <div class="gameOverTitle">GAME OVER</div>
            <div class="finalScore">Final Score: <span id="finalScoreValue">0</span></div>
            <button id="restartButton">RESTART</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game State
        const gameState = {
            isRunning: false,
            score: 0,
            level: 1,
            gameOver: false,
            playerX: 0,
            playerSpeed: 0.5
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e27);
        scene.fog = new THREE.Fog(0x0a0e27, 150, 300);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const canvas = document.createElement('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        document.getElementById('gameContainer').appendChild(canvas);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x00ff88, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(20, 30, 20);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.left = -50;
        directionalLight.shadow.camera.right = 50;
        directionalLight.shadow.camera.top = 50;
        directionalLight.shadow.camera.bottom = -50;
        scene.add(directionalLight);

        // Neon Light Effects
        const neonLight1 = new THREE.PointLight(0x00ff88, 0.5, 100);
        neonLight1.position.set(-15, 5, 0);
        scene.add(neonLight1);

        const neonLight2 = new THREE.PointLight(0x00ffcc, 0.5, 100);
        neonLight2.position.set(15, 5, 0);
        scene.add(neonLight2);

        // Create Player (Green Cube)
        const playerGeometry = new THREE.BoxGeometry(2, 2, 2);
        const playerMaterial = new THREE.MeshPhongMaterial({
            color: 0x00ff88,
            emissive: 0x00ff88,
            emissiveIntensity: 0.5,
            shininess: 100
        });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.castShadow = true;
        player.receiveShadow = true;
        player.position.y = 1;
        scene.add(player);

        // Game Objects Arrays
        const obstacles = [];
        const bonuses = [];
        const particles = [];

        // Create Platform
        const platformGeometry = new THREE.PlaneGeometry(20, 100);
        const platformMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1f3a,
            metalness: 0.3,
            roughness: 0.7
        });
        const platform = new THREE.Mesh(platformGeometry, platformMaterial);
        platform.rotation.x = -Math.PI / 2;
        platform.position.y = -1;
        platform.receiveShadow = true;
        scene.add(platform);

        // Create Grid Pattern
        const gridHelper = new THREE.GridHelper(20, 20, 0x00ff88, 0x0a2a1f);
        gridHelper.position.z = -50;
        gridHelper.position.y = -0.9;
        scene.add(gridHelper);

        // Input Handling
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // UI Elements
        const scoreDisplay = document.getElementById('score');
        const difficultyDisplay = document.getElementById('difficulty');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const finalScoreValue = document.getElementById('finalScoreValue');

        // Start Game
        startButton.addEventListener('click', () => {
            gameState.isRunning = true;
            gameState.gameOver = false;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.remove('show');
        });

        // Restart Game
        restartButton.addEventListener('click', () => {
            resetGame();
        });

        // Space to restart from game
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' && gameState.gameOver) {
                e.preventDefault();
                resetGame();
            }
        });

        function resetGame() {
            gameState.score = 0;
            gameState.level = 1;
            gameState.gameOver = false;
            gameState.playerX = 0;
            gameState.isRunning = true;
            player.position.x = 0;
            obstacles.length = 0;
            bonuses.length = 0;
            gameOverScreen.classList.remove('show');
            updateUI();
            spawnDistance = 0;
        }

        function updateUI() {
            scoreDisplay.textContent = `SCORE: ${gameState.score}`;
            difficultyDisplay.textContent = `LEVEL: ${gameState.level}`;
        }

        // Obstacle Creation
        let spawnDistance = 0;
        function spawnObstacle() {
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshPhongMaterial({
                color: 0xff0064,
                emissive: 0xff0064,
                emissiveIntensity: 0.6,
                shininess: 100
            });
            const obstacle = new THREE.Mesh(geometry, material);
            obstacle.castShadow = true;
            obstacle.receiveShadow = true;
            obstacle.position.x = (Math.random() - 0.5) * 16;
            obstacle.position.y = 1;
            obstacle.position.z = -spawnDistance;
            obstacle.health = 100;
            scene.add(obstacle);
            obstacles.push({
                mesh: obstacle,
                passed: false
            });
        }

        // Bonus Creation
        function spawnBonus() {
            const geometry = new THREE.OctahedronGeometry(1, 2);
            const material = new THREE.MeshPhongMaterial({
                color: 0x00ff00,
                emissive: 0x00ff00,
                emissiveIntensity: 0.8,
                shininess: 100
            });
            const bonus = new THREE.Mesh(geometry, material);
            bonus.castShadow = true;
            bonus.receiveShadow = true;
            bonus.position.x = (Math.random() - 0.5) * 14;
            bonus.position.y = 2;
            bonus.position.z = -spawnDistance;
            bonus.rotation.x = Math.random() * Math.PI;
            scene.add(bonus);
            bonuses.push({
                mesh: bonus,
                collected: false
            });
        }

        // Collision Detection
        function checkCollisions() {
            const playerBox = new THREE.Box3().setFromObject(player);

            // Check obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obstacle = obstacles[i];
                const obstacleBox = new THREE.Box3().setFromObject(obstacle.mesh);
                
                if (playerBox.intersectsBox(obstacleBox)) {
                    endGame();
                    return;
                }

                // Check if passed
                if (!obstacle.passed && obstacle.mesh.position.z > player.position.z) {
                    obstacle.passed = true;
                    gameState.score += 10;
                    updateUI();
                }
            }

            // Check bonuses
            for (let i = bonuses.length - 1; i >= 0; i--) {
                const bonus = bonuses[i];
                const bonusBox = new THREE.Box3().setFromObject(bonus.mesh);
                
                if (playerBox.intersectsBox(bonusBox) && !bonus.collected) {
                    bonus.collected = true;
                    gameState.score += 50;
                    createExplosion(bonus.mesh.position);
                    updateUI();
                }
            }
        }

        function createExplosion(position) {
            const particleCount = 10;
            for (let i = 0; i < particleCount; i++) {
                const geometry = new THREE.SphereGeometry(0.3, 8, 8);
                const material = new THREE.MeshPhongMaterial({
                    color: 0x00ff00,
                    emissive: 0x00ff00,
                    emissiveIntensity: 1
                });
                const particle = new THREE.Mesh(geometry, material);
                particle.position.copy(position);
                scene.add(particle);
                particles.push({
                    mesh: particle,
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.3,
                        Math.random() * 0.3,
                        (Math.random() - 0.5) * 0.3
                    ),
                    lifetime: 50
                });
            }
        }

        function endGame() {
            gameState.isRunning = false;
            gameState.gameOver = true;
            gameOverScreen.classList.add('show');
            finalScoreValue.textContent = gameState.score;
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        let frameCount = 0;
        function animate() {
            requestAnimationFrame(animate);

            if (gameState.isRunning) {
                frameCount++;

                // Player Movement
                if (keys['arrowleft'] || keys['a']) {
                    gameState.playerX = Math.max(gameState.playerX - gameState.playerSpeed, -8);
                }
                if (keys['arrowright'] || keys['d']) {
                    gameState.playerX = Math.min(gameState.playerX + gameState.playerSpeed, 8);
                }

                player.position.x = gameState.playerX;

                // Smooth camera follow
                camera.position.x = gameState.playerX * 0.5;
                camera.lookAt(gameState.playerX, 0, player.position.z + 20);

                // Move obstacles and bonuses
                const speed = 0.3 + gameState.level * 0.05;
                obstacles.forEach((obs, i) => {
                    obs.mesh.position.z += speed;
                    obs.mesh.rotation.x += 0.01;
                    obs.mesh.rotation.y += 0.01;

                    if (obs.mesh.position.z > 30) {
                        scene.remove(obs.mesh);
                        obstacles.splice(i, 1);
                    }
                });

                bonuses.forEach((bonus, i) => {
                    bonus.mesh.position.z += speed;
                    bonus.mesh.rotation.x += 0.02;
                    bonus.mesh.rotation.y += 0.02;

                    if (bonus.mesh.position.z > 30) {
                        scene.remove(bonus.mesh);
                        bonuses.splice(i, 1);
                    }
                });

                // Update particles
                particles.forEach((particle, i) => {
                    particle.mesh.position.add(particle.velocity);
                    particle.lifetime--;
                    particle.mesh.scale.multiplyScalar(0.95);

                    if (particle.lifetime <= 0) {
                        scene.remove(particle.mesh);
                        particles.splice(i, 1);
                    }
                });

                // Spawn logic
                spawnDistance += speed;
                if (spawnDistance % 15 < 0.5) {
                    spawnObstacle();
                }
                if (spawnDistance % 30 < 0.5) {
                    spawnBonus();
                }

                // Increase difficulty
                gameState.level = Math.floor(gameState.score / 100) + 1;

                // Collision check
                checkCollisions();
            }

            // Render
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
